services:
  nyxgate-postgres:
    image: postgres:16-alpine
    container_name: nyxgate-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - /opt/nyxgate/config/nyxgate.env
      - /opt/nyxgate/secrets/nyxgate.secrets.env
    # Port 5432 intentionally not exposed externally; access via Docker network only
    expose:
      - "5432"
    volumes:
      - nyxgate-postgres-data:/var/lib/postgresql/data
    networks:
      - nyxgate-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  nyxgate-redis:
    image: redis:7-alpine
    container_name: nyxgate-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    expose:
      - "6379"
    volumes:
      - nyxgate-redis-data:/data
    networks:
      - nyxgate-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  nyxgate-dashboard:
    image: nginx:1.27-alpine
    container_name: nyxgate-dashboard
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      nyxgate-api:
        condition: service_started
    ports:
      - "8443:8443"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1:8443/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    volumes:
      - ../deploy/nginx.dashboard.conf:/etc/nginx/nginx.conf:ro
      - ../ui/dist:/usr/share/nginx/html:ro
      - /opt/nyxgate/certs:/etc/nyxgate/certs:ro
    networks:
      - nyxgate-network

  nyxgate-api:
    image: nyxgate-api:latest
    container_name: nyxgate-api
    build:
      context: ..
      dockerfile: deploy/Dockerfile.controller
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - /opt/nyxgate/config/nyxgate.env
      - /opt/nyxgate/secrets/nyxgate.secrets.env
    environment:
      NYXGATE_LISTEN_ADDR: :9443
      NYXGATE_DB_HOST: nyxgate-postgres
      NYXGATE_DB_PORT: "5432"
      NYXGATE_DB_SSLMODE: disable
      NYXGATE_REDIS_ADDR: nyxgate-redis:6379
      NYXGATE_UI_BUILD_PATH: /app/no-ui
      NYXGATE_CERT_DIR: /etc/nyxgate/certs
      NYXGATE_CERT_FILE: /etc/nyxgate/certs/tls.crt
      NYXGATE_KEY_FILE: /etc/nyxgate/certs/tls.key
    depends_on:
      nyxgate-postgres:
        condition: service_healthy
      nyxgate-redis:
        condition: service_healthy
    expose:
      - "9443"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1:9443/api/setup/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    volumes:
      - /opt/nyxgate/certs:/etc/nyxgate/certs
      - /opt/nyxgate/config:/etc/nyxgate/config
      - /opt/nyxgate/secrets:/etc/nyxgate/secrets:ro
      - /opt/nyxgate/data:/var/lib/nyxgate
    networks:
      - nyxgate-network

volumes:
  nyxgate-postgres-data:
    name: nyxgate-postgres-data
  nyxgate-redis-data:
    name: nyxgate-redis-data

networks:
  nyxgate-network:
    name: nyxgate-network
